<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse de Prêt Bancaire | MLOps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-predict { background-color: #0d6efd; border-radius: 10px; transition: 0.3s; }
        .btn-predict:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        #result-container { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Prédicteur de Crédit</h2>
                    <p class="text-muted">Projet MLOps - Sorbonne DU-SDA</p>
                </div>

                <form id="prediction-form">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Revenu Annuel ($)</label>
                            <input type="number" name="income" class="form-control" placeholder="Ex: 50000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Âge</label>
                            <input type="number" name="age" class="form-control" placeholder="Ex: 35" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Années d'expérience</label>
                            <input type="number" name="years_employed" class="form-control" placeholder="Ex: 10" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Score FICO</label>
                            <input type="number" name="fico_score" class="form-control" placeholder="300 - 850" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Montant du Prêt ($)</label>
                            <input type="number" name="loan_amount" class="form-control" placeholder="Ex: 15000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Ratio Dette/Revenu</label>
                            <input type="number" step="0.01" name="debt_to_income" class="form-control" placeholder="Ex: 0.35" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg btn-predict">Analyser le dossier</button>
                    </div>
                </form>

                <div id="result-container" class="alert text-center fw-bold"></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('prediction-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const resultDiv = document.getElementById('result-container');
        
        resultDiv.style.display = 'block';
        resultDiv.className = 'alert alert-info';
        resultDiv.innerText = "Calcul en cours...";

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.prediction === 1) {
                resultDiv.className = 'alert alert-success';
                resultDiv.innerHTML = "✅ Prêt Accordé !";
            } else {
                resultDiv.className = 'alert alert-danger';
                resultDiv.innerHTML = "❌ Prêt Refusé.";
            }
        } catch (error) {
            resultDiv.className = 'alert alert-warning';
            resultDiv.innerText = "Erreur lors de la prédiction.";
        }
    });
</script>

</body>
</html>
